<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <style>
      :root {
        --bg: #0f1115;
        --panel: #151925;
        --text: #e7ecf4;
        --muted: #9aa3b2;
        --accent: #4fc3f7;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(1000px 600px at 20% 10%, #1a2030, var(--bg));
        color: var(--text);
      }
      .card {
        width: min(420px, 100%);
        background: var(--panel);
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 8px 0;
        font-size: 22px;
        letter-spacing: 0.5px;
      }
      p {
        margin: 0 0 18px 0;
        color: var(--muted);
        font-size: 14px;
      }
      label {
        display: block;
        font-size: 13px;
        margin-bottom: 6px;
        color: var(--muted);
      }
      input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #2d3d63;
        background: #0c0f18;
        color: var(--text);
        margin-bottom: 14px;
      }
      button {
        width: 100%;
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid #2d3d63;
        background: #1f2a44;
        color: var(--text);
        cursor: pointer;
        transition: transform 0.1s ease, background 0.2s ease;
      }
      button:hover {
        background: #263353;
      }
      button:active {
        transform: scale(0.98);
      }
      .error {
        color: #ff6e6e;
        font-size: 13px;
        margin-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Chef Hat Detection</h1>
      <p>Login with your superuser account to continue.</p>

      {% if form.errors %}
      <div class="error">Invalid username or password.</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <label for="id_username">Username</label>
        {{ form.username }}
        <label for="id_password">Password</label>
        {{ form.password }}
        <button type="submit">Login</button>
      </form>
    </div>
  </body>
</html>
