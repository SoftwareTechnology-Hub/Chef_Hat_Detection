<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Chef Hat Detection{% endblock %}</title>
    <style>
      :root {
        --bg: #0f1115;
        --panel: #151925;
        --text: #e7ecf4;
        --muted: #9aa3b2;
        --accent: #4fc3f7;
        --accent-strong: #5bd1ff;
        --warn: #d50000;
        --sidebar: #0b0f18;
        --sidebar-border: #1e2a46;
        --nav-hover: #1a2336;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        padding: 0;
        font-family: "Space Grotesk", "Trebuchet MS", "Segoe UI", sans-serif;
        background: radial-gradient(1200px 800px at 15% 10%, #1a2334, var(--bg));
        color: var(--text);
      }
      .layout {
        display: grid;
        grid-template-columns: 260px 1fr;
        min-height: 100vh;
      }
      .topbar {
        display: none;
        align-items: center;
        justify-content: space-between;
        padding: 16px 18px;
        border-bottom: 1px solid var(--sidebar-border);
        background: rgba(10, 14, 22, 0.95);
        position: sticky;
        top: 0;
        z-index: 200;
        backdrop-filter: blur(8px);
      }
      .menu-btn {
        border: 1px solid rgba(31, 42, 68, 0.9);
        background: rgba(21, 25, 37, 0.9);
        color: var(--text);
        border-radius: 10px;
        padding: 10px 12px;
        cursor: pointer;
        font-weight: 600;
        letter-spacing: 0.2px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .menu-btn:hover {
        background: var(--nav-hover);
      }
      .menu-icon {
        width: 20px;
        height: 14px;
        display: inline-flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .menu-icon span {
        height: 2px;
        border-radius: 999px;
        background: var(--text);
        display: block;
      }
      .sidebar {
        padding: 24px 18px 20px;
        background: linear-gradient(180deg, rgba(12, 16, 26, 0.98), rgba(9, 12, 20, 0.98));
        border-right: 1px solid var(--sidebar-border);
        display: flex;
        flex-direction: column;
        gap: 22px;
        position: sticky;
        top: 0;
        height: 100vh;
        overflow-y: auto;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 700;
        font-size: 18px;
        letter-spacing: 0.6px;
      }
      .brand-mark {
        width: 36px;
        height: 36px;
        border-radius: 12px;
        background: radial-gradient(circle at 30% 30%, var(--accent-strong), #1f2a44 70%);
        box-shadow: 0 10px 20px rgba(79, 195, 247, 0.25);
        display: grid;
        place-items: center;
        color: #0b0f18;
        font-size: 16px;
        font-weight: 700;
      }
      .brand-subtitle {
        font-size: 12px;
        color: var(--muted);
        margin-top: 4px;
        letter-spacing: 0.3px;
      }
      .sidebar-card {
        padding: 14px;
        border-radius: 16px;
        background: rgba(21, 25, 37, 0.85);
        border: 1px solid rgba(79, 195, 247, 0.18);
      }
      .sidebar-card h3 {
        margin: 0 0 8px 0;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: var(--muted);
      }
      .stat-row {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        margin-bottom: 6px;
      }
      .stat-row strong {
        color: var(--text);
      }
      .nav {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .nav a {
        display: block;
        padding: 12px 14px;
        border-radius: 12px;
        color: var(--text);
        text-decoration: none;
        background: rgba(21, 25, 37, 0.9);
        border: 1px solid rgba(31, 42, 68, 0.9);
        transition: transform 0.12s ease, background 0.2s ease, border-color 0.2s ease;
      }
      .nav a:hover {
        background: var(--nav-hover);
        border-color: rgba(79, 195, 247, 0.3);
        transform: translateY(-1px);
      }
      .nav a.active {
        background: rgba(31, 42, 68, 0.95);
        border-color: rgba(79, 195, 247, 0.55);
        box-shadow: 0 0 0 1px rgba(79, 195, 247, 0.18);
      }
      .sidebar-footer {
        margin-top: auto;
        font-size: 12px;
        color: var(--muted);
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .sidebar-footer .btn {
        width: 100%;
        justify-content: center;
      }
      .main {
        padding: 24px;
      }
      .card {
        width: min(900px, 100%);
        background: var(--panel);
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 8px 0;
        font-size: 24px;
        letter-spacing: 0.5px;
      }
      p {
        margin: 0 0 18px 0;
        color: var(--muted);
        font-size: 14px;
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      .btn {
        display: inline-block;
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid #2d3d63;
        background: #1f2a44;
        color: var(--text);
        cursor: pointer;
        transition: transform 0.1s ease, background 0.2s ease;
      }
      .btn:hover {
        background: #263353;
      }
      .btn:active {
        transform: scale(0.98);
      }
      @media (max-width: 720px) {
        .layout {
          grid-template-columns: 1fr;
        }
        .topbar {
          display: flex;
        }
        .sidebar .brand,
        .sidebar-card,
        .sidebar-footer {
          display: none;
        }
        .sidebar {
          position: fixed;
          top: 64px;
          left: 16px;
          right: 16px;
          max-height: calc(100vh - 80px);
          overflow: auto;
          border: 1px solid var(--sidebar-border);
          border-radius: 18px;
          box-shadow: 0 24px 40px rgba(0, 0, 0, 0.45);
          transform: translateY(-12px);
          opacity: 0;
          pointer-events: none;
          transition: opacity 0.2s ease, transform 0.2s ease;
          z-index: 150;
        }
        .sidebar.open {
          opacity: 1;
          transform: translateY(0);
          pointer-events: auto;
        }
        .nav {
          display: flex;
          gap: 8px;
          flex-direction: column;
        }
        .nav a {
          margin-bottom: 0;
        }
        .card {
          padding: 20px;
        }
        h1 {
          font-size: 20px;
        }
        .main {
          padding: 18px;
          padding-top: 24px;
        }
      }
      .auth .layout {
        grid-template-columns: 1fr;
      }
      .auth .sidebar {
        display: none;
      }
      .auth .main {
        display: grid;
        place-items: center;
      }
    </style>
    {% block head %}{% endblock %}
  </head>
  <body class="{% block body_class %}{% endblock %}">
    <div class="layout">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">CH</div>
          <div>
            Chef Hat
            <div class="brand-subtitle">Compliance Console</div>
          </div>
        </div>
        <button class="menu-btn" type="button" aria-expanded="false" aria-controls="sidebar">
          <span class="menu-icon" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </span>
        </button>
      </header>
      <aside class="sidebar">
        <div>
          <div class="brand">
            <div class="brand-mark">CH</div>
            <div>
              Chef Hat
              <div class="brand-subtitle">Compliance Console</div>
            </div>
          </div>
        </div>

        

        <nav class="nav">
          <a href="/">Dashboard</a>
          <a href="/alerts/">Alerts</a>
        </nav>

        <div class="sidebar-footer">
          <span>Chef Hat Suite v1</span>
          <form method="post" action="/accounts/logout/">
            {% csrf_token %}
            <button class="btn" type="submit">Logout</button>
          </form>
        </div>
      </aside>
      <main class="main">{% block content %}{% endblock %}</main>
    </div>
    <script>
      (function () {
        var btn = document.querySelector(".menu-btn");
        var sidebar = document.querySelector(".sidebar");
        if (!btn || !sidebar) return;

        btn.addEventListener("click", function () {
          var isOpen = sidebar.classList.toggle("open");
          btn.setAttribute("aria-expanded", isOpen ? "true" : "false");
        });

        document.addEventListener("click", function (event) {
          if (window.innerWidth > 720) return;
          if (sidebar.contains(event.target) || btn.contains(event.target)) return;
          sidebar.classList.remove("open");
          btn.setAttribute("aria-expanded", "false");
        });
      })();
    </script>
  </body>
</html>
